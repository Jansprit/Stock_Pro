name: Feature request
description: 提議新功能或改善
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解決的問題
      description: 你想做什麼？為什麼想做？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提議的解法
      description: 你覺得怎麼做比較好？
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 想過的其他方案
      description: 有沒有考慮過別的做法？為什麼選現在這個？
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: 影響範圍
      description: 這個改動會影響哪些檔案 / 區塊？
    validations:
      required: false